version: '3.8'

services:
  test-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_gogate
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_gogate"]
      interval: 2s
      timeout: 2s
      retries: 10
